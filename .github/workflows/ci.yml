name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile script
        run: python -m py_compile nutanix_health_check.py

      - name: Validate command-line interface
        run: |
          python nutanix_health_check.py --help
          expected_version="$(python -c 'import nutanix_health_check as app; print(app.__version__)')"
          actual_version="$(python nutanix_health_check.py --version)"
          test "$actual_version" = "nutanix_health_check.py $expected_version"
